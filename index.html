<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>桌面小植物</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main id="app" class="app" aria-label="桌面小植物">
      <section id="chatPanel" class="chat-panel hidden" aria-label="小植物面板">
        <svg class="panel-shape" viewBox="0 0 320 430" preserveAspectRatio="none" aria-hidden="true">
          <path
            class="panel-shape-fill"
            d="M22 14 C54 5, 104 8, 154 10 C210 4, 270 8, 300 20 C314 48, 312 112, 310 178 C318 246, 313 340, 298 408 C256 422, 194 420, 142 418 C92 424, 44 420, 18 406 C6 350, 10 278, 8 216 C4 144, 8 50, 22 14 Z"
          />
          <path
            class="panel-shape-stroke"
            d="M22 14 C54 5, 104 8, 154 10 C210 4, 270 8, 300 20 C314 48, 312 112, 310 178 C318 246, 313 340, 298 408 C256 422, 194 420, 142 418 C92 424, 44 420, 18 406 C6 350, 10 278, 8 216 C4 144, 8 50, 22 14 Z"
          />
        </svg>

        <button id="collapsePanelBtn" class="panel-collapse" type="button" aria-label="收起面板">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M12 3.5 C17 3.5, 20.5 7, 20.5 12 C20.5 17, 17 20.5, 12 20.5 C7 20.5, 3.5 17, 3.5 12 C3.5 7, 7 3.5, 12 3.5 Z" />
            <path d="M8.5 8.5 L15.5 15.5" />
            <path d="M15.5 8.5 L8.5 15.5" />
          </svg>
        </button>

        <div class="panel-tabs" role="tablist" aria-label="面板切换">
          <button id="chatTabBtn" class="panel-tab active" type="button" role="tab" aria-selected="true">对话</button>
          <button id="statusTabBtn" class="panel-tab" type="button" role="tab" aria-selected="false">状态</button>
        </div>

        <section id="chatView" class="panel-view">
          <div id="chatHistory" class="chat-history" aria-live="polite"></div>
          <form id="panelChatForm" class="chat-form handdraw-chat-form">
            <svg class="handdraw-chat-shape" viewBox="0 0 280 64" preserveAspectRatio="none" aria-hidden="true">
              <path
                class="handdraw-chat-fill"
                d="M18 12 C34 5, 72 6, 116 8 C162 4, 221 6, 260 12 C274 18, 278 32, 272 45 C262 59, 218 60, 170 57 C116 62, 58 59, 20 52 C8 44, 7 22, 18 12 Z"
              />
              <path
                class="handdraw-chat-stroke"
                d="M18 12 C34 5, 72 6, 116 8 C162 4, 221 6, 260 12 C274 18, 278 32, 272 45 C262 59, 218 60, 170 57 C116 62, 58 59, 20 52 C8 44, 7 22, 18 12 Z"
              />
            </svg>
            <div class="handdraw-chat-content">
              <input id="panelChatInput" class="chat-input handdraw-chat-input" type="text" placeholder="和小植物说句话" autocomplete="off" />
              <button id="panelChatSendBtn" class="chat-send handdraw-icon-button send-button" type="submit" aria-label="发送">发送</button>
            </div>
          </form>
        </section>

        <section id="statusView" class="panel-view hidden" aria-live="polite">
          <div id="statusLoading" class="status-note hidden">正在同步植物状态...</div>
          <div id="statusError" class="status-note hidden"></div>

          <article class="status-card profile-card plant-info">
            <div class="plant-left">
              <button id="profileAvatarButton" class="profile-avatar plant-avatar" type="button" aria-label="修改头像">
                <img id="profileAvatarImage" class="plant-avatar-image" alt="植物头像" />
              </button>
              <input id="profileAvatarInput" class="hidden" type="file" accept="image/*" />
              <div class="profile-meta plant-text">
                <div class="plant-name-row">
                  <h3 id="profileName" class="profile-name">-</h3>
                  <button id="profileNameEditBtn" class="plant-name-edit" type="button" aria-label="修改名字">编辑</button>
                </div>
                <input id="profileNameInput" class="profile-name-input hidden" type="text" maxlength="16" />
                <p id="profileSpecies" class="profile-sub">-</p>
                <p id="profileScientific" class="profile-sub">-</p>
              </div>
            </div>
            <div class="plant-days">
              <div id="profileCompanionDaysNumber" class="days-number">-</div>
              <div class="days-label">天陪伴</div>
            </div>
          </article>

          <section class="status-section plant-species-picker">
            <label class="section-title" for="plantSpeciesSelect">植物品种</label>
            <select id="plantSpeciesSelect" class="plant-species-select"></select>
            <p id="plantSpeciesDescription" class="plant-species-description"></p>
          </section>

          <section class="status-section">
            <div class="section-title">传感状态</div>
            <div id="sensorGrid" class="sensor-grid"></div>
          </section>

          <section id="achievementListView" class="status-section">
            <div class="section-title">成就里程碑</div>
            <div id="achievementGrid" class="achievement-grid"></div>
          </section>

          <section id="achievementDetailView" class="status-section hidden">
            <button id="achievementBackBtn" class="detail-back" type="button">返回成就列表</button>
            <div id="achievementDetailCard" class="status-card achievement-detail"></div>
          </section>
          <section id="petDebugTools" class="status-section pet-debug-tools">
            <div class="section-title">开发调试</div>
            <div class="pet-debug-grid">
              <button class="pet-debug-btn" type="button" data-debug-action="idle">播放 idle</button>
              <button class="pet-debug-btn" type="button" data-debug-action="touch">播放 touch</button>
              <button class="pet-debug-btn" type="button" data-debug-action="reward-pending">设置奖励待领取</button>
              <button class="pet-debug-btn" type="button" data-debug-action="mock-dry">模拟缺水</button>
              <button class="pet-debug-btn" type="button" data-debug-action="mock-low-light">模拟光照不足</button>
              <button class="pet-debug-btn" type="button" data-debug-action="mock-hot">模拟温度异常</button>
              <button class="pet-debug-btn" type="button" data-debug-action="mock-normal">模拟恢复正常</button>
            </div>
          </section>
        </section>

        <div id="panelResizeHandle" class="panel-resize-handle" aria-hidden="true"></div>
      </section>

      <div class="pet-stack">
        <button id="bubble" class="bubble hidden" type="button" role="status" aria-live="polite">
          <svg class="bubble-shape" viewBox="0 0 320 118" preserveAspectRatio="none" aria-hidden="true">
            <path
              class="bubble-fill"
              d="M24 18 C38 8, 66 8, 94 12 C142 8, 198 8, 246 14 C282 14, 305 22, 312 36 C319 50, 319 66, 312 80 C304 94, 282 102, 246 103 C202 110, 152 110, 102 107 C72 111, 44 109, 28 98 C16 88, 10 74, 12 60 C10 46, 14 30, 24 18 Z"
            />
            <path
              class="bubble-stroke"
              d="M24 18 C38 8, 66 8, 94 12 C142 8, 198 8, 246 14 C282 14, 305 22, 312 36 C319 50, 319 66, 312 80 C304 94, 282 102, 246 103 C202 110, 152 110, 102 107 C72 111, 44 109, 28 98 C16 88, 10 74, 12 60 C10 46, 14 30, 24 18 Z"
            />
            <path
              class="bubble-tail-stroke"
              d="M232 101 C242 108, 252 115, 266 117 C254 109, 250 101, 252 91"
            />
          </svg>
          <span id="bubbleText" class="bubble-text"></span>
        </button>

        <button id="plant" class="plant normal" type="button" aria-label="桌面小植物">
          <span class="plant-hot-mark" aria-hidden="true">☀</span>
          <div class="pet-stage">
            <img id="petAnimation" class="plant-image pet-animation" src="./assets/pet/idle_fixed.gif" alt="桌面小植物" draggable="false" />
            <span id="plantEmoji" class="plant-emoji hidden" aria-hidden="true">🌱</span>
          </div>
          <span class="plant-shadow" aria-hidden="true"></span>
        </button>

        <form id="inlineChatForm" class="input-bar handdraw-chat-form hidden" aria-label="快速回复">
          <svg class="handdraw-chat-shape" viewBox="0 0 280 64" preserveAspectRatio="none" aria-hidden="true">
            <path
              class="handdraw-chat-fill"
              d="M18 12 C34 5, 72 6, 116 8 C162 4, 221 6, 260 12 C274 18, 278 32, 272 45 C262 59, 218 60, 170 57 C116 62, 58 59, 20 52 C8 44, 7 22, 18 12 Z"
            />
            <path
              class="handdraw-chat-stroke"
              d="M18 12 C34 5, 72 6, 116 8 C162 4, 221 6, 260 12 C274 18, 278 32, 272 45 C262 59, 218 60, 170 57 C116 62, 58 59, 20 52 C8 44, 7 22, 18 12 Z"
            />
          </svg>
          <div class="handdraw-chat-content">
            <input id="inlineChatInput" class="inline-input handdraw-chat-input" type="text" placeholder="和小植物说句话" autocomplete="off" />
            <button id="inlineChatSendBtn" class="icon-button handdraw-icon-button send-button" type="submit" aria-label="发送">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M4 12 L20 5 L15 20 L11 14 L4 12 Z" />
                <path d="M11 14 L20 5" />
              </svg>
            </button>
            <button id="expandPanelBtn" class="icon-button handdraw-icon-button expand-button" type="button" aria-label="展开聊天面板">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M7 6 C10 5, 15 5, 18 7 C19 10, 19 15, 17 18 C13 19, 9 19, 6 17 C5 13, 5 9, 7 6 Z" />
                <path d="M10 14 L15 9" />
                <path d="M12 9 H15 V12" />
              </svg>
            </button>
          </div>
        </form>
      </div>
    </main>

    <script type="module" src="./renderer.js"></script>
  </body>
</html>
