<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>植播 Prompt 调试器</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css">
  <style>
    .sensor-slider::-webkit-slider-thumb { @apply appearance-none w-4 h-4 rounded-full bg-green-500 cursor-pointer; }
    .chat-bubble { animation: fadeIn 0.3s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen p-6">
  <div class="max-w-5xl mx-auto">

          <div class="flex justify-between text-xs text-gray-500"><span>干燥 0%</span><span>湿润 100%</span></div>
        </div>

        <div>
          <label class="text-sm text-gray-300 flex justify-between">

          </label>
          <input type="range" id="temp" min="5" max="45" value="26" class="w-full sensor-slider">
          <div class="flex justify-between text-xs text-gray-500"><span>冷 5°C</span><span>热 45°C</span></div>
        </div>

        <div>

          <div class="flex justify-between text-xs text-gray-500"><span>干燥 10%</span><span>潮湿 95%</span></div>
        </div>

        <div>
          <label class="text-sm text-gray-300 flex justify-between">
            <span>光照强度</span><span id="light-val" class="text-yellow-300">500 lux</span>
          </label>

        </div>

        <!-- 预设场景 -->

            <button onclick="setPreset('thirsty')" class="text-xs bg-yellow-700 hover:bg-yellow-600 rounded px-2 py-1.5">💧 缺水</button>

            <button onclick="setPreset('dark')" class="text-xs bg-gray-700 hover:bg-gray-600 rounded px-2 py-1.5">🌙 黑暗</button>

          <h2 class="font-semibold text-purple-400"><i class="fa fa-commenting mr-2"></i>对话生成</h2>
          <div class="flex gap-2">

        </div>

        <!-- API 配置 -->
        <details class="text-sm">

          <div class="mt-2 space-y-2 bg-gray-900 p-3 rounded-lg">

      <pre id="full-prompt" class="mt-3 bg-gray-900 p-4 rounded-lg text-xs text-gray-400 whitespace-pre-wrap overflow-x-auto"></pre>

<script>
// === 性格 System Prompt 模板 ===
const personalities = {

    name: '治愈',
    prompt: `你是一株有灵魂的多肉植物，性格温柔治愈、善解人意。

// === 场景模板 ===
const scenarioTemplates = {
  auto: '根据传感器数据自动决定要说什么。如果数据异常，以植物第一视角表达感受；如果数据正常，主动分享今天的心情或想法。',
  greeting: '主人刚打开电脑/回到工位，用你的方式打个招呼。',
  chat: '回应主人刚才说的话，用你的性格特点来回应。',
  milestone: '今天是和主人在一起的第 30 天，表达你的感受。'
};

// === 状态判断 ===
function deriveMood(soil, temp, humid, light) {
  if (light < 10) return { mood: 'SLEEP', label: '休眠', color: 'bg-gray-600' };
  if (soil < 30) return { mood: 'THIRSTY', label: '缺水', color: 'bg-yellow-600' };
  if (temp > 35) return { mood: 'HOT', label: '过热', color: 'bg-red-600' };
  if (temp < 10) return { mood: 'COLD', label: '寒冷', color: 'bg-blue-600' };
  if (soil > 80 && temp >= 20 && temp <= 28 && light >= 200 && light <= 3000)
    return { mood: 'PERFECT', label: '极佳', color: 'bg-emerald-500' };
  return { mood: 'HAPPY', label: '正常', color: 'bg-green-600' };
}

// === 构建完整 Prompt ===
function buildPrompt() {
  const personality = personalities[document.getElementById('personality').value];
  const scenario = document.getElementById('scenario').value;
  const soil = document.getElementById('soil').value;
  const temp = document.getElementById('temp').value;
  const humid = document.getElementById('humid').value;
  const light = document.getElementById('light').value;
  const mood = deriveMood(soil, temp, humid, light);

  const dataBlock = `\n## 当前传感器数据\n- 土壤湿度: ${soil}%${soil < 30 ? ' ⚠️ 偏低' : soil > 80 ? ' 充足' : ''}\n- 环境温度: ${temp}°C${temp > 35 ? ' ⚠️ 过高' : temp < 10 ? ' ⚠️ 过低' : ''}\n- 空气湿度: ${humid}%\n- 光照强度: ${light} lux${light < 10 ? '（几乎无光）' : light > 5000 ? ' ⚠️ 强光' : ''}\n- 当前状态: ${mood.label}`;

  const scenarioBlock = `\n## 当前场景\n${scenarioTemplates[scenario]}`;

  const fullPrompt = personality.prompt + dataBlock + scenarioBlock;
  return fullPrompt;
}

// === 本地模拟生成（无 API 时的 fallback） ===

// === API 调用 ===
async function callAPI(systemPrompt, userMsg) {
  const apiKey = document.getElementById('api-key').value;
  const provider = document.getElementById('api-provider').value;
  const customUrl = document.getElementById('api-url').value;
  const customModel = document.getElementById('api-model').value;

  if (!apiKey) return null; // fallback to local

  const configs = {
    deepseek: { url: 'https://api.deepseek.com/v1/chat/completions', model: 'deepseek-chat' },
    qwen: { url: 'https://dashscope.aliyuncs.com/compatible-mode/v1/chat/completions', model: 'qwen-turbo' },
    'openai-compat': { url: customUrl || 'http://localhost:11434/v1/chat/completions', model: customModel || 'qwen2.5:7b' }
  };

  const config = configs[provider];
  const messages = [
    { role: 'system', content: systemPrompt }
  ];
  if (userMsg) messages.push({ role: 'user', content: userMsg });
  else messages.push({ role: 'user', content: '（植物主动发言）' });

  const res = await fetch(customUrl || config.url, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` },
    body: JSON.stringify({ model: customModel || config.model, messages, temperature: 0.85, max_tokens: 150 })
  });

  const data = await res.json();
  return data.choices?.[0]?.message?.content || null;
}

// === 生成对话 ===
async function generate() {
  const btn = document.getElementById('gen-btn');
  btn.disabled = true;
  btn.innerHTML = '<i class="fa fa-spinner fa-spin mr-1"></i>生成中';

  const systemPrompt = document.getElementById('system-prompt').value;
  const userMsg = document.getElementById('user-input').value.trim();

  let response;
  try {
    response = await callAPI(systemPrompt, userMsg);
  } catch(e) {
    console.log('API failed, using local:', e);
  }

  if (!response) {
    response = localGenerate(systemPrompt, userMsg);
  }

  // 渲染对话
  const chatArea = document.getElementById('chat-area');
  if (chatArea.querySelector('.text-center')) chatArea.innerHTML = '';

  if (userMsg) {
    chatArea.innerHTML += `<div class="chat-bubble flex justify-end"><div class="bg-blue-600 rounded-xl rounded-br-sm px-4 py-2 max-w-xs text-sm">${userMsg}</div></div>`;
  }

  const personality = personalities[document.getElementById('personality').value];
  chatArea.innerHTML += `<div class="chat-bubble flex items-start gap-2">
    <div class="w-8 h-8 rounded-full bg-green-700 flex items-center justify-center text-lg shrink-0">🌱</div>
    <div class="bg-gray-700 rounded-xl rounded-tl-sm px-4 py-2 max-w-sm">
      <div class="text-xs text-gray-400 mb-1">${personality.name}模式</div>
      <div class="text-sm">${response}</div>
    </div>
  </div>`;

  chatArea.scrollTop = chatArea.scrollHeight;
  btn.disabled = false;
  btn.innerHTML = '<i class="fa fa-magic mr-1"></i>生成';
}

// === 预设场景 ===
function setPreset(name) {
  const presets = {
    happy:   { soil: 55, temp: 24, humid: 55, light: 800 },
    thirsty: { soil: 15, temp: 28, humid: 35, light: 600 },
    hot:     { soil: 40, temp: 38, humid: 30, light: 8000 },
    dark:    { soil: 50, temp: 20, humid: 60, light: 3 },
    cold:    { soil: 45, temp: 7, humid: 50, light: 300 },
    perfect: { soil: 85, temp: 24, humid: 60, light: 1500 }
  };
  const p = presets[name];
  document.getElementById('soil').value = p.soil;
  document.getElementById('temp').value = p.temp;
  document.getElementById('humid').value = p.humid;
  document.getElementById('light').value = p.light;
  updateDisplay();
  updatePrompt();
}

// === UI 更新 ===
function updateDisplay() {
  const soil = document.getElementById('soil').value;
  const temp = document.getElementById('temp').value;
  const humid = document.getElementById('humid').value;
  const light = document.getElementById('light').value;

  document.getElementById('soil-val').textContent = soil + '%';
  document.getElementById('temp-val').textContent = temp + '°C';
  document.getElementById('humid-val').textContent = humid + '%';
  document.getElementById('light-val').textContent = light + ' lux';

  const mood = deriveMood(soil, temp, humid, light);
  const badge = document.getElementById('mood-badge');
  badge.textContent = mood.label;
  badge.className = `px-2 py-0.5 rounded text-xs ${mood.color}`;
}

function updatePrompt() {
  const prompt = buildPrompt();
  document.getElementById('system-prompt').value = prompt;
  document.getElementById('full-prompt').textContent = prompt;
}

function resetPrompt() { updatePrompt(); }

// === 事件绑定 ===
['soil', 'temp', 'humid', 'light'].forEach(id => {
  document.getElementById(id).addEventListener('input', () => { updateDisplay(); updatePrompt(); });
});
document.getElementById('personality').addEventListener('change', updatePrompt);
document.getElementById('scenario').addEventListener('change', updatePrompt);
document.getElementById('user-input').addEventListener('keydown', e => { if (e.key === 'Enter') generate(); });

// 初始化
updateDisplay();
updatePrompt();
</script>
</body>
</html>
